<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wint Wealth — Dashboards</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f0f2f5;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  .tab-bar {
    display: flex;
    background: #1a1a2e;
    padding: 0 24px;
    gap: 4px;
    flex-shrink: 0;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    z-index: 10;
  }

  .tab-bar .logo {
    display: flex;
    align-items: center;
    padding: 0 20px 0 0;
    font-size: 16px;
    font-weight: 700;
    color: #fff;
    letter-spacing: -0.3px;
    border-right: 1px solid rgba(255,255,255,0.1);
    margin-right: 8px;
  }

  .tab {
    padding: 14px 24px;
    font-size: 14px;
    font-weight: 500;
    color: rgba(255,255,255,0.55);
    cursor: pointer;
    border: none;
    background: none;
    position: relative;
    transition: color 0.2s;
    white-space: nowrap;
  }

  .tab:hover {
    color: rgba(255,255,255,0.85);
  }

  .tab.active {
    color: #fff;
    font-weight: 600;
  }

  .tab.active::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 12px;
    right: 12px;
    height: 3px;
    background: #6366f1;
    border-radius: 3px 3px 0 0;
  }

  .tab-content {
    flex: 1;
    position: relative;
  }

  .tab-content iframe {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    border: none;
    display: none;
  }

  .tab-content iframe.active {
    display: block;
  }
</style>
</head>
<body>

<div class="tab-bar">
  <div class="logo">Wint Wealth</div>
  <button class="tab active" data-target="frame-ckyc">CKYC Journey</button>
  <button class="tab" data-target="frame-bonds">Bonds Issues Dashboard</button>
</div>

<div class="tab-content">
  <iframe id="frame-ckyc" class="active" src="ckyc_journey.html"></iframe>
  <iframe id="frame-bonds" src="stable_bonds_issues_dashboard.html"></iframe>
</div>

<script>
  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-content iframe').forEach(f => f.classList.remove('active'));
      tab.classList.add('active');
      document.getElementById(tab.dataset.target).classList.add('active');
    });
  });
</script>

</body>
</html>
