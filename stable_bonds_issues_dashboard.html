<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stable Bonds #bonds-issues Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0a0a0f 0%, #1a1a25 100%);
            color: #e0e0e0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
            line-height: 1.6;
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 30px 20px;
        }

        /* Header */
        .header {
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            color: #ffffff;
            font-weight: 600;
        }

        .header p {
            font-size: 1rem;
            color: #a0a0a0;
        }

        /* KPI Cards */
        .kpi-section {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .kpi-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 25px;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        .kpi-card:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }

        .kpi-label {
            font-size: 0.9rem;
            color: #a0a0a0;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 10px;
        }

        .kpi-value {
            font-size: 2.5rem;
            font-weight: 700;
            color: #ffffff;
        }

        /* Category Colors */
        .cat-payment { --color: #ef4444; }
        .cat-kyc { --color: #f97316; }
        .cat-bank { --color: #eab308; }
        .cat-gains { --color: #22c55e; }
        .cat-trading { --color: #3b82f6; }
        .cat-demat { --color: #8b5cf6; }
        .cat-form { --color: #ec4899; }
        .cat-system { --color: #06b6d4; }
        .cat-account { --color: #14b8a6; }

        /* Category Bar */
        .category-breakdown {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 40px;
            backdrop-filter: blur(10px);
        }

        .category-breakdown h3 {
            margin-bottom: 20px;
            font-size: 1.1rem;
            color: #ffffff;
        }

        .category-bars {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .category-bar {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .category-label {
            min-width: 150px;
            font-size: 0.9rem;
            font-weight: 500;
            color: #e0e0e0;
        }

        .bar-container {
            flex: 1;
            height: 30px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 6px;
            overflow: hidden;
            position: relative;
        }

        .bar-fill {
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 10px;
            color: #ffffff;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .bar-count {
            min-width: 40px;
            text-align: right;
            font-size: 0.9rem;
            font-weight: 600;
            color: #ffffff;
        }

        /* Filters */
        .filters-section {
            margin-bottom: 30px;
        }

        .filters-title {
            font-size: 0.9rem;
            text-transform: uppercase;
            color: #a0a0a0;
            margin-bottom: 15px;
            letter-spacing: 0.5px;
        }

        .filter-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
        }

        .filter-btn {
            padding: 10px 20px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.02);
            color: #e0e0e0;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .filter-btn:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .filter-btn.active {
            background: #3b82f6;
            border-color: #3b82f6;
            color: #ffffff;
        }

        .search-box {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: #e0e0e0;
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }

        .search-box:focus {
            outline: none;
            background: rgba(255, 255, 255, 0.08);
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        /* Issues Grid */
        .issues-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .issue-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 20px;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            gap: 12px;
            backdrop-filter: blur(10px);
        }

        .issue-card:hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(255, 255, 255, 0.2);
            transform: translateY(-4px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        .issue-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 10px;
        }

        .issue-date {
            font-size: 0.8rem;
            color: #a0a0a0;
        }

        .category-badge {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #ffffff;
            white-space: nowrap;
        }

        .issue-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: #ffffff;
            line-height: 1.4;
        }

        .issue-description {
            font-size: 0.95rem;
            color: #d0d0d0;
            line-height: 1.5;
        }

        .issue-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            padding-top: 12px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        .issue-author {
            font-size: 0.85rem;
            color: #a0a0a0;
        }

        .slack-link {
            padding: 8px 12px;
            background: #3b82f6;
            color: #ffffff;
            text-decoration: none;
            border-radius: 6px;
            font-size: 0.8rem;
            font-weight: 600;
            transition: all 0.3s ease;
            white-space: nowrap;
        }

        .slack-link:hover {
            background: #2563eb;
            transform: translateX(2px);
        }

        /* No Results */
        .no-results {
            grid-column: 1 / -1;
            text-align: center;
            padding: 60px 20px;
            color: #a0a0a0;
        }

        .no-results p {
            font-size: 1.1rem;
            margin-bottom: 10px;
        }

        /* Results Info */
        .results-info {
            color: #a0a0a0;
            font-size: 0.9rem;
            margin-bottom: 15px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8rem;
            }

            .kpi-section {
                grid-template-columns: 1fr 1fr;
            }

            .issues-grid {
                grid-template-columns: 1fr;
            }

            .category-label {
                min-width: 120px;
                font-size: 0.85rem;
            }

            .filter-buttons {
                flex-direction: column;
            }

            .filter-btn {
                width: 100%;
            }
        }

        /* Hidden class */
        .hidden {
            display: none !important;
        }

        /* Sub-bucket styles */
        .sub-bucket-section {
            grid-column: 1 / -1;
            margin-top: 10px;
            margin-bottom: 5px;
        }

        .sub-bucket-header {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 20px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .sub-bucket-header:hover {
            background: rgba(255, 255, 255, 0.07);
        }

        .sub-bucket-header .sb-icon {
            font-size: 0.8rem;
            transition: transform 0.3s ease;
            color: #a0a0a0;
        }

        .sub-bucket-header.expanded .sb-icon {
            transform: rotate(90deg);
        }

        .sub-bucket-header .sb-name {
            font-size: 1rem;
            font-weight: 600;
            color: #ffffff;
            flex: 1;
        }

        .sub-bucket-header .sb-count {
            font-size: 0.85rem;
            font-weight: 700;
            padding: 4px 12px;
            border-radius: 20px;
            color: #fff;
        }

        .sub-bucket-header .sb-repeat-tag {
            font-size: 0.7rem;
            font-weight: 600;
            padding: 3px 8px;
            border-radius: 4px;
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .sub-bucket-cards {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 16px;
            padding: 16px 0 0 0;
        }

        .sub-bucket-cards.collapsed {
            display: none;
        }

        /* Sub-bucket breakdown inside category breakdown */
        .sub-bucket-breakdown {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 10px;
            padding: 20px 25px;
            margin-bottom: 30px;
        }

        .sub-bucket-breakdown h3 {
            font-size: 1.05rem;
            color: #ffffff;
            margin-bottom: 18px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .sub-bucket-breakdown h3 .cat-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
        }

        .sb-mini-bars {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .sb-mini-bar {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .sb-mini-bar .sb-label {
            min-width: 200px;
            font-size: 0.85rem;
            color: #d0d0d0;
        }

        .sb-mini-bar .sb-bar-wrap {
            flex: 1;
            height: 22px;
            background: rgba(255,255,255,0.04);
            border-radius: 4px;
            overflow: hidden;
        }

        .sb-mini-bar .sb-bar-fill {
            height: 100%;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 8px;
            font-size: 0.72rem;
            font-weight: 700;
            color: #fff;
            transition: width 0.5s ease;
        }

        .sb-mini-bar .sb-bar-num {
            min-width: 30px;
            text-align: right;
            font-weight: 700;
            font-size: 0.85rem;
            color: #ffffff;
        }

        @media (max-width: 768px) {
            .sb-mini-bar .sb-label { min-width: 140px; font-size: 0.8rem; }
            .sub-bucket-cards { grid-template-columns: 1fr; }
        }
    </style>
</head>

            { date: '2026-02-24 16:25:23', ts: '1771927523.454269', category: 'Trading & Withdrawal', title: 'No withdrawal option for ISIN', description: '888699b5-INE0NES07188-not getting withdrawal option', author: 'MANAS RANJAN NAHAK' },
            { date: '2026-02-24 15:35:23', ts: '1771924523.453789', category: 'Gains & Portfolio Display', title: 'Negative value display issue', description: '720e6670- fix this issue, we are showing -ve value', author: 'MANAS RANJAN NAHAK' },
            { date: '2026-02-24 15:26:52', ts: '1771924012.453459', category: 'Trading & Withdrawal', title: 'Withdrawal option blocked - ISIN issue', description: '918076880909 -- unable to get withdraw option - ISIN - INE0NES07188', author: 'Mamatha D' },
            { date: '2026-02-24 14:38:21', ts: '1771921101.452529', category: 'Demat & CVL', title: 'Demat creation failure', description: 'demat is not getting created. Please check', author: 'Prachi Arun Khaparde' },
            { date: '2026-02-24 11:39:00', ts: '1771910340.451829', category: 'Bank Account', title: 'Fetching wrong bank info', description: '919322229073 - user trying to add individual bank account, fetching another person\'s bank info', author: 'Subhash K R' },
            { date: '2026-02-24 09:32:24', ts: '1771902744.451529', category: 'Gains & Portfolio Display', title: 'Difference in returns', description: '918175875253 - there is a difference in returns', author: 'MISBA KHANUM' },
            { date: '2026-02-23 19:46:00', ts: '1771853160.450529', category: 'Gains & Portfolio Display', title: 'Gains count mismatch', description: '917001271437-its showing 24, it is 25 total-gains', author: 'Kumar Sunny Anand' },
            { date: '2026-02-23 17:01:07', ts: '1771843267.449759', category: 'Trading & Withdrawal', title: 'Withdraw option missing - no debugging info', description: '919686956569 -- unable to get withdraw option, not getting any reason in retool', author: 'Mamatha D' },
            { date: '2026-02-23 13:36:55', ts: '1771831015.448759', category: 'Gains & Portfolio Display', title: 'Gains static for one week', description: '919910728389 --My gains figure is static for around last one week', author: 'Mamatha D' }
        ];

        // Category colors mapping
        const categoryColors = {
            'Payment & Settlement': '#ef4444',
            'KYC & Onboarding': '#f97316',
            'Bank Account': '#eab308',
            'Gains & Portfolio Display': '#22c55e',
            'Trading & Withdrawal': '#3b82f6',
            'Demat & CVL': '#8b5cf6',
            'Form 15G / TDS': '#ec4899',
            'System / API Errors': '#06b6d4',
            'Account Management': '#14b8a6'
        };

        // ─── Sub-bucket classification rules ───
        const subBucketRules = {
            'Payment & Settlement': [
                { name: 'Payment Failure / Error', keywords: ['payment', 'unable to pay', 'unable to make payment', 'not able to do the payment', 'unable to proceed with the payment', 'transaction is failing', 'netbanking'] },
                { name: 'Settlement Delay', keywords: ['settlement', 'not yet settled', 'settled'] },
                { name: 'UPI / Payment Method', keywords: ['upi', 'upi option'] },
                { name: 'Refund Pending', keywords: ['refund', 'reversed', 'cancelled after payment', 'debited', 'verification'] },
                { name: 'Interest / Payout Return', keywords: ['interest payment', 'returned back'] },
            ],
            'KYC & Onboarding': [
                { name: 'PAN Issues', keywords: ['pan', 'pan kyc', 'duplicate pan', 'pan onboarding', 'pan verified with another'] },
                { name: 'Aadhaar / DigiLocker', keywords: ['aadhaar', 'aadhar', 'digilocker', 'digi locker', '9 digit', '12 digit', 'vid number'] },
                { name: 'eSign Failure', keywords: ['esign', 'e sign', 'e-sign'] },
                { name: 'Name Mismatch', keywords: ['name mismatch', 'name as per itd', 'name change', 'corporation'] },
                { name: 'Address / Regional Language', keywords: ['address', 'regional language'] },
                { name: 'KYC Verification Error', keywords: ['kyc', 'verify', 'onboarding', 'approve'] },
            ],
            'Bank Account': [
                { name: 'Bank Update Not Synced', keywords: ['not updated', 'not synced', 'still old', 'still updated as', 'cml', 'ifsc', 'not reflecting'] },
                { name: 'Unable to Add Bank', keywords: ['unable to add', 'not able to add', 'add bank', 'add new bank', 'bank details'] },
                { name: 'Bank Change / eSign Stuck', keywords: ['esign', 'change', 'changed'] },
                { name: 'Wrong Bank Info Fetched', keywords: ['fetching', 'wrong', 'another person'] },
            ],
            'Gains & Portfolio Display': [
                { name: 'Negative / Minus Gains', keywords: ['negative', 'minus', '-ve', 'in minus'] },
                { name: 'Incorrect Gains', keywords: ['incorrect', 'difference', 'discrepancy', 'mismatch', 'showing less', 'showing 24'] },
                { name: 'Gains Not Updating', keywords: ['static', 'not reflecting', 'not updating', '8 days'] },
                { name: 'Payout / Net Worth Display', keywords: ['payout', 'net worth', 'networth', 'sell amount'] },
            ],
            'Trading & Withdrawal': [
                { name: 'Trading Banned', keywords: ['banned', 'trade banned'] },
                { name: 'Withdrawal Option Missing', keywords: ['withdraw', 'withdrawal option', 'not getting withdraw', 'sell option'] },
                { name: 'Order Cancellation Issues', keywords: ['cancel', 'cancelled'] },
                { name: 'Sell Order / Settlement', keywords: ['sell order', 'settlement', 'rejected', 'status not updated'] },
                { name: 'Other Trading', keywords: ['ecas', 'receipts', 'maturity', 'retool', 'trade date'] },
            ],
            'Demat & CVL': [
                { name: 'Demat Creation Failure', keywords: ['demat is not', 'demat not', 'demat creation', 'demat getting created', 'demat pushed'] },
                { name: 'CVL / NSE Push Failure', keywords: ['cvl', 'nse push', 'cvl push'] },
                { name: 'Wet Signature Issues', keywords: ['wet sign', 'wet signature'] },
                { name: 'DDPI Issues', keywords: ['ddpi'] },
                { name: 'eSign / CDSL Issues', keywords: ['esign', 'cdsl', 'cdsl down', 'demat change', 'all bonds'] },
            ],
            'Form 15G / TDS': [
                { name: 'Form 15G Submission Error', keywords: ['submission', 'submit', 'queued', 'submit button', 'not showing successfully'] },
                { name: 'TDS / 26AS Issues', keywords: ['tds', '26as'] },
                { name: 'Interest Amount Mismatch', keywords: ['interest', 'amount'] },
                { name: 'Bulk 15G/H Processing', keywords: ['populate', 'bulk', 'midland', '15g/h form'] },
            ],
            'System / API Errors': [
                { name: '500 / API Errors', keywords: ['500', 'api', 'badresponse', 'server error'] },
                { name: 'Dashboard Not Working', keywords: ['dashboard', 'onboarding dashboard'] },
                { name: 'App Crash / Unable to Proceed', keywords: ['unable to proceed', 'unable to move', 'not moving', 'unable to use app', 'coming back', 'unable to click', 'not able to proceed'] },
                { name: 'Funnel / System Down', keywords: ['funnel', 'down', 'staging'] },
                { name: 'Other System Issues', keywords: ['tag', 'duplicate', 'error', 'fetch'] },
            ],
            'Account Management': [
                { name: 'User Banned', keywords: ['banned', 'ban'] },
                { name: 'Account Deletion', keywords: ['delete', 'close demat'] },
                { name: 'Login / OTP Issues', keywords: ['login', 'log in', 'otp', 'password', 'lost mobile'] },
                { name: 'CDSL / CMR Issues', keywords: ['cdsl', 'cmr', 'dp id', 'cas', 'authentication'] },
                { name: 'Name / Account Modification', keywords: ['name change', 'demat change'] },
            ]
        };

        function getSubBucket(issue) {
            const rules = subBucketRules[issue.category];
            if (!rules) return 'Other';
            const text = (issue.title + ' ' + issue.description).toLowerCase();
            for (const rule of rules) {
                if (rule.keywords.some(kw => text.includes(kw))) return rule.name;
            }
            return 'Other';
        }

        // Assign sub-bucket to each issue
        issues.forEach(i => { i.subBucket = getSubBucket(i); });

        // Count issues by category
        const categoryCounts = {};
        issues.forEach(issue => {
            categoryCounts[issue.category] = (categoryCounts[issue.category] || 0) + 1;
        });

        let currentCategory = 'All';

        // Initialize dashboard
        function initDashboard() {
            renderCategoryBars();
            renderFilterButtons();
            renderIssues(issues);
            updateTopCategory();
        }

        function renderCategoryBars() {
            const container = document.getElementById('categoryBars');
            const maxCount = Math.max(...Object.values(categoryCounts));

            Object.entries(categoryCounts)
                .sort((a, b) => b[1] - a[1])
                .forEach(([category, count]) => {
                    const percentage = (count / maxCount) * 100;
                    const color = categoryColors[category];

                    const barHtml = `
                        <div class="category-bar" style="cursor:pointer;" onclick="filterByCategory('${category}')">
                            <div class="category-label">${category}</div>
                            <div class="bar-container">
                                <div class="bar-fill" style="width: ${percentage}%; background: ${color};">
                                    ${count > 0 ? count : ''}
                                </div>
                            </div>
                            <div class="bar-count">${count}</div>
                        </div>
                    `;
                    container.innerHTML += barHtml;
                });
        }

        function renderFilterButtons() {
            const container = document.getElementById('filterButtons');
            container.innerHTML = '<button class="filter-btn active" onclick="filterByCategory(\'All\')">All Issues</button>';

            Object.keys(categoryCounts)
                .sort((a, b) => categoryCounts[b] - categoryCounts[a])
                .forEach(category => {
                    const btn = document.createElement('button');
                    btn.className = 'filter-btn';
                    btn.textContent = category;
                    btn.onclick = () => filterByCategory(category);
                    container.appendChild(btn);
                });
        }

        function filterByCategory(category) {
            currentCategory = category;
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.toggle('active', btn.textContent === category || (category === 'All' && btn.textContent === 'All Issues'));
            });

            // Clear search
            document.getElementById('searchBox').value = '';

            if (category === 'All') {
                hideSubBucketBreakdown();
                renderIssues(issues);
            } else {
                const filtered = issues.filter(i => i.category === category);
                showSubBucketBreakdown(category, filtered);
                renderIssuesGrouped(filtered, category);
            }
        }

        function showSubBucketBreakdown(category, filtered) {
            const el = document.getElementById('subBucketBreakdown');
            const color = categoryColors[category];

            // Count sub-buckets
            const sbCounts = {};
            filtered.forEach(i => { sbCounts[i.subBucket] = (sbCounts[i.subBucket] || 0) + 1; });
            const sorted = Object.entries(sbCounts).sort((a,b) => b[1] - a[1]);
            const maxSb = sorted[0][1];

            let barsHtml = sorted.map(([name, count]) => {
                const pct = (count / maxSb) * 100;
                const repeatTag = count >= 3 ? `<span class="sb-repeat-tag">Recurring (${count}x)</span>` : (count >= 2 ? `<span class="sb-repeat-tag" style="background:rgba(234,179,8,0.2);color:#eab308;">Repeated (${count}x)</span>` : '');
                return `
                    <div class="sb-mini-bar">
                        <div class="sb-label">${name} ${repeatTag}</div>
                        <div class="sb-bar-wrap">
                            <div class="sb-bar-fill" style="width:${pct}%;background:${color};">${count > 2 ? count : ''}</div>
                        </div>
                        <div class="sb-bar-num">${count}</div>
                    </div>`;
            }).join('');

            el.innerHTML = `
                <h3><span class="cat-dot" style="background:${color};"></span>${category} — Sub-Buckets</h3>
                <div class="sb-mini-bars">${barsHtml}</div>
            `;
            el.style.display = 'block';
        }

        function hideSubBucketBreakdown() {
            document.getElementById('subBucketBreakdown').style.display = 'none';
        }

        function renderIssuesGrouped(filtered, category) {
            const grid = document.getElementById('issuesGrid');
            const noResults = document.getElementById('noResults');
            grid.innerHTML = '';

            if (filtered.length === 0) {
                noResults.style.display = 'block';
                document.getElementById('displayCount').textContent = '0';
                return;
            }

            noResults.style.display = 'none';
            document.getElementById('displayCount').textContent = filtered.length;

            const color = categoryColors[category];

            // Group by sub-bucket
            const groups = {};
            filtered.forEach(i => {
                if (!groups[i.subBucket]) groups[i.subBucket] = [];
                groups[i.subBucket].push(i);
            });

            // Sort groups by count desc
            const sortedGroups = Object.entries(groups).sort((a,b) => b[1].length - a[1].length);

            sortedGroups.forEach(([sbName, sbIssues], idx) => {
                const repeatTag = sbIssues.length >= 3 ? `<span class="sb-repeat-tag">Recurring ${sbIssues.length}x</span>` : (sbIssues.length >= 2 ? `<span class="sb-repeat-tag" style="background:rgba(234,179,8,0.2);color:#eab308;">Repeated ${sbIssues.length}x</span>` : '');
                const expanded = idx < 3; // expand top 3 by default

                // Sub-bucket section header
                const sectionId = 'sb-' + idx;
                const headerHtml = `
                    <div class="sub-bucket-section">
                        <div class="sub-bucket-header ${expanded ? 'expanded' : ''}" onclick="toggleSubBucket('${sectionId}', this)">
                            <span class="sb-icon">▶</span>
                            <span class="sb-name">${sbName}</span>
                            ${repeatTag}
                            <span class="sb-count" style="background:${color};">${sbIssues.length}</span>
                        </div>
                        <div class="sub-bucket-cards ${expanded ? '' : 'collapsed'}" id="${sectionId}">
                            ${sbIssues.map(issue => renderCardHtml(issue)).join('')}
                        </div>
                    </div>
                `;
                grid.innerHTML += headerHtml;
            });
        }

        function toggleSubBucket(id, headerEl) {
            const cards = document.getElementById(id);
            cards.classList.toggle('collapsed');
            headerEl.classList.toggle('expanded');
        }

        function renderCardHtml(issue) {
            const color = categoryColors[issue.category];
            const ts_without_dot = issue.ts.replace('.', '');
            const slackLink = `https://stablemoneyworkspace.slack.com/archives/C080NA28SDQ/p${ts_without_dot}`;
            return `
                <div class="issue-card">
                    <div class="issue-header">
                        <span class="issue-date">${issue.date}</span>
                        <span class="category-badge" style="background: ${color};">${issue.category}</span>
                    </div>
                    <div class="issue-title">${issue.title}</div>
                    <div class="issue-description">${issue.description}</div>
                    <div class="issue-footer">
                        <span class="issue-author">By ${issue.author}</span>
                        <a href="${slackLink}" target="_blank" class="slack-link">View in Slack</a>
                    </div>
                </div>
            `;
        }

        function renderIssues(issuesToRender) {
            const grid = document.getElementById('issuesGrid');
            const noResults = document.getElementById('noResults');

            grid.innerHTML = '';
            hideSubBucketBreakdown();

            if (issuesToRender.length === 0) {
                noResults.style.display = 'block';
                document.getElementById('displayCount').textContent = '0';
                return;
            }

            noResults.style.display = 'none';
            document.getElementById('displayCount').textContent = issuesToRender.length;

            issuesToRender.forEach(issue => {
                grid.innerHTML += renderCardHtml(issue);
            });
        }

        function updateTopCategory() {
            const topCat = Object.entries(categoryCounts)
                .sort((a, b) => b[1] - a[1])[0][0];
            document.getElementById('topCategory').textContent = topCat.split(' ')[0];
        }

        document.getElementById('searchBox').addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase();

            if (!query) {
                if (currentCategory === 'All') {
                    renderIssues(issues);
                } else {
                    const filtered = issues.filter(i => i.category === currentCategory);
                    renderIssuesGrouped(filtered, currentCategory);
                    showSubBucketBreakdown(currentCategory, filtered);
                }
                return;
            }

            const base = currentCategory === 'All' ? issues : issues.filter(i => i.category === currentCategory);
            const filtered = base.filter(issue =>
                issue.description.toLowerCase().includes(query) ||
                issue.author.toLowerCase().includes(query) ||
                issue.title.toLowerCase().includes(query) ||
                issue.subBucket.toLowerCase().includes(query)
            );

            if (currentCategory !== 'All' && filtered.length > 0) {
                renderIssuesGrouped(filtered, currentCategory);
            } else {
                hideSubBucketBreakdown();
                renderIssues(filtered);
            }
        });

        initDashboard();
    </script>
</body>
